<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: sans-serif;
      color: #fff;
    }
    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
      background: #16213e;
    }
    #info {
      margin-top: 12px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="480" height="420"></canvas>
  <div id="info">マウスでパドル操作 ／ 左クリックで弾発射・ボール解放</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // ---- 定数 ----
    const COLS = 8, ROWS = 5;
    const BLOCK_W = 52, BLOCK_H = 18, PADDING = 4;
    const OFFSET_X = 16, OFFSET_Y = 44;
    const BLOCK_COLORS = ['#e94560','#f5a623','#f8e71c','#7ed321','#50e3c2'];
    const SHOT_COOLDOWN = 300;

    // アイテム種別
    const ITEM_TYPES = {
      TRIPLE:    { label: '3×', color: '#b44aff', desc: '3つ弾' },
      CATCH:     { label: 'C',  color: '#00d4ff', desc: 'キャッチ' },
      PENETRATE: { label: 'P',  color: '#ff5722', desc: '貫通'   },
    };
    const ITEM_KEYS = Object.keys(ITEM_TYPES);

    // ---- 状態 ----
    let blocks, balls, bullets, items;
    let score, lives, gameState;
    let lastShotTime = 0;

    // パドル
    const paddle = { w: 80, h: 10, x: 200, y: H - 30, speed: 6 };

    // パワーアップ状態
    const power = {
      catch: false,      // キャッチ中
      penetrate: false,  // 貫通中
      penetrateTimer: 0,
    };

    const keys = {};

    // ---- 初期化 ----
    function initBlocks() {
      blocks = [];
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          blocks.push({
            x: OFFSET_X + c * (BLOCK_W + PADDING),
            y: OFFSET_Y + r * (BLOCK_H + PADDING),
            alive: true, color: BLOCK_COLORS[r]
          });
    }

    function makeBall(x, y, dx, dy) {
      return { r: 8, x, y, dx, dy, caught: false, catchOffsetX: 0 };
    }

    function resetBalls() {
      const bx = paddle.x + paddle.w / 2;
      const by = paddle.y - 10;
      balls = [makeBall(bx, by, (Math.random() > 0.5 ? 1 : -1) * 3, -3)];
      balls[0].caught = true;
      balls[0].catchOffsetX = 0;
    }

    function restart() {
      score = 0; lives = 3; gameState = 'playing';
      paddle.x = 200;
      bullets = []; items = [];
      power.catch = false;
      power.penetrate = false; power.penetrateTimer = 0;
      initBlocks();
      resetBalls();
    }

    // ---- アイテムドロップ ----
    function tryDropItem(block) {
      if (Math.random() > 0.35) return;
      const type = ITEM_KEYS[Math.floor(Math.random() * ITEM_KEYS.length)];
      items.push({
        x: block.x + BLOCK_W / 2,
        y: block.y + BLOCK_H / 2,
        type, dy: 2.5
      });
    }

    // ---- パワーアップ適用 ----
    function applyItem(type) {
      if (type === 'TRIPLE') {
        const newBalls = [];
        balls.forEach(b => {
          if (b.caught) return;
          const speed = Math.hypot(b.dx, b.dy);
          const angle = Math.atan2(b.dy, b.dx);
          [-0.4, 0.4].forEach(da => {
            newBalls.push(makeBall(b.x, b.y,
              Math.cos(angle + da) * speed,
              Math.sin(angle + da) * speed));
          });
        });
        balls.push(...newBalls);
      } else if (type === 'CATCH') {
        power.catch = true;
      } else if (type === 'PENETRATE') {
        power.penetrate = true;
        power.penetrateTimer = 600; // フレーム数
      }
    }

    // ---- 描画ヘルパー ----
    function drawRect(x, y, w, h, color, radius = 3) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, radius);
      ctx.fill();
    }
    function drawCircle(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---- 描画 ----
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // ブロック
      blocks.forEach(b => {
        if (!b.alive) return;
        drawRect(b.x, b.y, BLOCK_W, BLOCK_H, b.color);
      });

      // アイテム
      items.forEach(it => {
        const t = ITEM_TYPES[it.type];
        drawRect(it.x - 14, it.y - 10, 28, 20, t.color, 4);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t.label, it.x, it.y + 4);
        ctx.textAlign = 'left';
      });

      // 弾
      bullets.forEach(b => {
        ctx.fillStyle = '#f5a623';
        ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
      });

      // ボール
      balls.forEach(b => {
        const color = power.penetrate ? '#ff7043' : '#ffffff';
        drawCircle(b.x, b.y, b.r, color);
      });

      // パドル（キャッチ中は色変え）
      const paddleColor = power.catch ? '#00d4ff' : '#e94560';
      drawRect(paddle.x, paddle.y, paddle.w, paddle.h, paddleColor, 5);

      // スコア・残機
      ctx.fillStyle = '#fff';
      ctx.font = '14px sans-serif';
      ctx.fillText(`スコア: ${score}`, 10, 22);
      ctx.fillText(`残機: ${'♥'.repeat(lives)}`, W - 90, 22);

      // アクティブパワーアップ表示
      const activePowers = [];
      if (power.catch) activePowers.push({ label: 'CATCH', color: '#00d4ff' });
      if (power.penetrate) activePowers.push({ label: `PENETRATE ${Math.ceil(power.penetrateTimer/60)}s`, color: '#ff5722' });
      activePowers.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText(p.label, W / 2 - 60 + i * 110, 22);
      });

      // ゲームオーバー / クリア
      if (gameState !== 'playing') {
        ctx.fillStyle = 'rgba(0,0,0,0.65)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(gameState === 'clear' ? 'STAGE CLEAR!' : 'GAME OVER', W/2, H/2 - 20);
        ctx.font = '16px sans-serif';
        ctx.fillText(`スコア: ${score}`, W/2, H/2 + 14);
        ctx.fillText('クリックまたはスペースでリスタート', W/2, H/2 + 42);
        ctx.textAlign = 'left';
      }
    }

    // ---- 更新 ----
    function update() {
      if (gameState !== 'playing') return;

      // パドル移動
      if (keys['ArrowLeft'] && paddle.x > 0) paddle.x -= paddle.speed;
      if (keys['ArrowRight'] && paddle.x + paddle.w < W) paddle.x += paddle.speed;

      // 貫通タイマー
      if (power.penetrate) {
        power.penetrateTimer--;
        if (power.penetrateTimer <= 0) power.penetrate = false;
      }

      // ---- ボール更新 ----
      balls = balls.filter(ball => {
        // キャッチ中はパドルに固定
        if (ball.caught) {
          ball.x = paddle.x + paddle.w / 2 + ball.catchOffsetX;
          ball.y = paddle.y - ball.r - 1;
          return true;
        }

        ball.x += ball.dx;
        ball.y += ball.dy;

        // 壁反射
        if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
        if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
        if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

        // 落下
        if (ball.y - ball.r > H) return false;

        // パドル衝突
        if (
          ball.dy > 0 &&
          ball.y + ball.r >= paddle.y &&
          ball.y - ball.r <= paddle.y + paddle.h &&
          ball.x >= paddle.x - ball.r &&
          ball.x <= paddle.x + paddle.w + ball.r
        ) {
          if (power.catch) {
            ball.caught = true;
            ball.catchOffsetX = ball.x - (paddle.x + paddle.w / 2);
            return true;
          }
          ball.dy = -Math.abs(ball.dy);
          const offset = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
          ball.dx = offset * 5;
        }

        // ブロック衝突
        for (const b of blocks) {
          if (!b.alive) continue;
          if (
            ball.x + ball.r > b.x && ball.x - ball.r < b.x + BLOCK_W &&
            ball.y + ball.r > b.y && ball.y - ball.r < b.y + BLOCK_H
          ) {
            b.alive = false;
            score += 10;
            tryDropItem(b);

            if (!power.penetrate) {
              const overlapX = Math.min(ball.x + ball.r - b.x, b.x + BLOCK_W - (ball.x - ball.r));
              const overlapY = Math.min(ball.y + ball.r - b.y, b.y + BLOCK_H - (ball.y - ball.r));
              if (overlapX < overlapY) ball.dx *= -1; else ball.dy *= -1;
              break; // 貫通しない場合は1ブロックのみ
            }
            // 貫通時は続けて次のブロックも判定
          }
        }

        return true;
      });

      // ボールが全滅したら残機減
      if (balls.length === 0) {
        lives--;
        if (lives <= 0) { gameState = 'gameover'; return; }
        power.catch = false;
        power.penetrate = false; power.penetrateTimer = 0;
        resetBalls();
        return;
      }

      // ---- 弾の更新 ----
      bullets = bullets.filter(bullet => {
        bullet.y -= 8;
        if (bullet.y < 0) return false;
        for (const b of blocks) {
          if (!b.alive) continue;
          if (bullet.x > b.x && bullet.x < b.x + BLOCK_W &&
              bullet.y < b.y + BLOCK_H && bullet.y + 6 > b.y) {
            b.alive = false;
            score += 10;
            tryDropItem(b);
            return false;
          }
        }
        return true;
      });

      // ---- アイテム更新 ----
      items = items.filter(it => {
        it.y += it.dy;
        if (it.y > H) return false;
        // パドルに当たったか
        if (
          it.y + 10 >= paddle.y && it.y - 10 <= paddle.y + paddle.h &&
          it.x + 14 >= paddle.x && it.x - 14 <= paddle.x + paddle.w
        ) {
          applyItem(it.type);
          return false;
        }
        return true;
      });

      // クリア判定
      if (blocks.every(b => !b.alive)) gameState = 'clear';
    }

    // ---- 入力 ----
    function releaseCaughtBalls() {
      balls.forEach(b => {
        if (!b.caught) return;
        b.caught = false;
        b.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
        b.dy = -4;
      });
    }

    function shoot() {
      if (gameState !== 'playing') return;
      const now = Date.now();
      if (now - lastShotTime < SHOT_COOLDOWN) return;
      lastShotTime = now;
      bullets.push({ x: paddle.x + paddle.w / 2, y: paddle.y });
    }

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        if (gameState !== 'playing') restart();
        else releaseCaughtBalls();
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      paddle.x = Math.max(0, Math.min(W - paddle.w, e.clientX - rect.left - paddle.w / 2));
    });

    canvas.addEventListener('click', () => {
      if (gameState !== 'playing') { restart(); return; }
      const hasCaught = balls.some(b => b.caught);
      if (hasCaught) releaseCaughtBalls();
      else shoot();
    });

    // ---- メインループ ----
    restart();

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
